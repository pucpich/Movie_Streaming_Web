spring.application.name=moviestreaming

# --------- CẤU HÌNH MONGODB ---------
# Kết nối MongoDB Local
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/moviestreamingdb}

# TMDB API (The Movie Database)
tmdb.api.key=${TMDB_API_KEY:7e53636ceb00490e8cf14bef210310e7}
tmdb.api.base=${TMDB_API_BASE:https://api.themoviedb.org/3}
tmdb.image.base=${TMDB_IMAGE_BASE:https://image.tmdb.org/t/p/w500}

# JWT Configuration
# Secret key >= 256 bit (32 ký tự) để ký HS256
jwt.secret=${JWT_SECRET:ChangeThisSecretKeyBeforeProduction2026!}
# Thời gian hết hạn token: 7 ngày (ms)
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
