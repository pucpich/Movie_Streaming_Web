<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liqi Phim - Trang chủ</title>
  <style>
    :root {
      --bg: #0b1017;
      --text: #f5f6fa;
      --muted: #b1b9c7;
      --accent: #ffd363;
      --accent2: #ff4561;
      --card: rgba(20, 30, 45, 0.85);
      --border: rgba(255,255,255,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: radial-gradient(circle at top left, #1d2b42 0%, #0b1017 60%); color: var(--text); min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .navbar { display: flex; flex-direction: column; gap: 10px; padding: 12px 0; }
    .nav-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .nav-top-right { display: inline-flex; align-items: center; gap: 10px; }
    .nav-bottom { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.12); }
    .brand { display: inline-flex; align-items: center; gap: 8px; font-size: 1.35rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: #fff; }
    .brand span { color: #ffd363; }
    .menu { display: flex; gap: 14px; list-style: none; flex-wrap: wrap; }
    .menu li a { color: var(--muted); text-decoration: none; font-weight: 600; transition: color .2s; }
    .menu li a:hover { color: #fff; }
    .search-wrap { position: relative; flex: 1; max-width: 420px; }
    .search-wrap input { width: 100%; padding: 10px 40px 10px 14px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.25); background: rgba(15, 20, 30, 0.85); color: #fff; }
    .search-clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      display: none;
      transition: all 0.2s;
    }
    .search-clear-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* Filter theo: phim lẻ/bộ + thể loại + chủ đề */
    .filter-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
      margin-bottom: 10px;
    }
    .filter-item { display: flex; gap: 8px; align-items: center; }
    .filter-item label { color: var(--muted); font-weight: 700; font-size: .9rem; }
    .filter-item select {
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(15, 20, 30, 0.85);
      color: #fff;
      font-weight: 700;
      max-width: 240px;
    }
    .hero { position: relative; margin-top: 18px; border: 1px solid transparent; border-radius: 16px; overflow: hidden; background-size: cover; background-position: center; min-height: 520px; transition: background-image 0.5s ease;
      /* Giảm lớp phủ để ảnh bìa rõ hơn */
      background-image: linear-gradient(250deg, rgba(11, 16, 23, .55) 33%, rgba(11, 16, 23, .18) 50%, rgba(11, 16, 23, .72) 100%), url('img/bia.jpg');
    }
    .hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(11,16,23,.62) 20%, rgba(11,16,23,0.06) 65%, rgba(11,16,23,.70) 100%); pointer-events: none; }
    .hero-content { position: relative; display: flex; flex-direction: column; gap: 12px; justify-content: center; height: 100%; padding: 40px; z-index: 2; }
    .hero-title { font-size: clamp(2rem, 4vw, 4rem); font-weight: 800; line-height: 1.1; pointer-events: auto; }
    .hero-sub { color: var(--accent); font-size: 1.1rem; letter-spacing: .6px; pointer-events: auto; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 10px; pointer-events: auto; }
    .pill { background: rgba(0,0,0,.45); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; color: #fff; font-weight: 600; font-size: .85rem; }
    .hero-desc { max-width: 600px; color: #dde3ee; margin-top: 14px; letter-spacing: .02em; pointer-events: auto; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .hero-actions { display: flex; gap: 10px; margin-top: 20px; pointer-events: auto; }
    .hero-thumbnails-wrap {
      position: absolute; bottom: 20px; right: 20px; left: 20px; display: flex; justify-content: flex-end; gap: 12px;
      overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; z-index: 10;
    }
    .hero-thumbnails-wrap::-webkit-scrollbar { display: none; }
    .hero-thumb {
      width: 140px; aspect-ratio: 16/9; border-radius: 8px; cursor: pointer; object-fit: cover;
      opacity: 0.5; border: 2px solid transparent; transition: all 0.3s ease; flex-shrink: 0;
    }
    .hero-thumb:hover { opacity: 0.8; transform: translateY(-2px); }
    .hero-thumb.active { opacity: 1; border-color: #fff; transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .btn { border: 0; border-radius: 999px; padding: 12px 24px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }
    .btn-play { background: linear-gradient(90deg, #ffd363 0%, #ff8a3c 100%); color: #000; }
    .btn-like { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); }
    .btn-fav {
      background: rgba(255, 120, 150, 0.16);
      color: #fff;
      border: 1px solid rgba(255, 120, 150, 0.5);
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 5px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-fav.active { background: #ff4561; border-color: #ff4561; color: #fff; }
    #member-btn {
      background: #fff;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }
    #member-btn:hover {
      background: #f3f5f7;
    }
    #member-btn:active {
      transform: translateY(1px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
    }

    .premium-top-btn{
      background: linear-gradient(90deg, #ffd363 0%, #ff8a3c 100%);
      color: #000;
      box-shadow: 0 10px 24px rgba(255, 138, 60, 0.26);
      border: 0;
      padding: 8px 14px;
      text-decoration: none;
    }
    .premium-top-btn:hover{ filter: brightness(1.02); }

    /* Menu tài khoản dạng dropdown */
    .member-wrap { position: relative; display: inline-flex; align-items: center; }
    .member-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 320px;
      background: #ffffff;
      color: #111;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
      overflow: hidden;
      display: none;
      z-index: 1000;
    }
    .member-wrap.is-open .member-dropdown { display: block; }
    .member-row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      font-weight: 800;
    }
    .member-row + .member-row { border-top: 1px solid rgba(0,0,0,0.08); }
    .member-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.06);
      flex: 0 0 auto;
    }
    .member-row small { display: block; font-weight: 650; color: rgba(0,0,0,0.55); margin-top: 2px; }
    .member-action {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 12px 14px;
      font-weight: 850;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .member-action:hover { background: rgba(0,0,0,0.04); }

    /* Toast thông báo đẹp */
    .toast-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      min-width: 280px;
      max-width: 420px;
      padding: 12px 14px;
      border-radius: 14px;
      color: #fff;
      box-shadow: 0 14px 35px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      animation: toastIn .18s ease-out;
    }
    .toast-success { background: linear-gradient(90deg, #1cbf73 0%, #13a7a0 100%); }
    .toast-error { background: linear-gradient(90deg, #ff4561 0%, #ff8a3c 100%); }
    .toast-title { font-weight: 950; margin-bottom: 2px; }
    .toast-msg { opacity: 0.95; font-weight: 700; }
    .toast-close {
      background: rgba(255,255,255,0.18);
      border: 0;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 900;
      flex: 0 0 auto;
    }
    @keyframes toastIn { from { transform: translateY(-6px); opacity: .0; } to { transform: translateY(0); opacity: 1; } }
    .section-title { margin-top: 34px; margin-bottom: 18px; font-size: 1.7rem; font-weight: 800; }
    .cards { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 16px; overflow: hidden; }
    .card { border-radius: 16px; padding: 20px; min-height: 150px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); transition: transform .2s ease, box-shadow .2s ease; }
    .card h3 { margin-bottom: 8px; font-size: 1.3rem; }
    .card small {
      color: rgba(255,255,255,0.95);
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      letter-spacing: 0.03em;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 14px 35px rgba(0,0,0,0.25); }
    .card.vientuong { background: linear-gradient(135deg, #d32f2f 0%, #e66465 100%); }
    .card.thailan { background: linear-gradient(135deg, #3146e8 0%, #8c65ff 100%); }
    .card.sitcom { background: linear-gradient(135deg, #0aa18e 0%, #4cbf8d 100%); }
    .card.chieurp { background: linear-gradient(135deg, #7457d9 0%, #9d83ff 100%); }
    .card.kinhdi { background: linear-gradient(135deg, #ed7b28 0%, #ff9b58 100%); }
    .card.cotrang { background: linear-gradient(135deg, #c72a2f 0%, #e55661 100%); }
    .card.more { background: linear-gradient(135deg, #4b516a 0%, #303a52 100%); }
    .card small { color: var(--muted); display: block; margin-top: 8px; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.25); }
    @media(max-width: 900px){
      .hero { min-height: 360px; }
      .hero-content { padding: 24px; }
      .nav-bottom { flex-wrap: wrap; }
      .search-wrap { width: 100%; max-width: 100%; }
    }
    @media(max-width: 640px){ .menu{display:none;} .brand{font-size:1.1rem;}}

    /* Popup thành viên */
    .auth-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .auth-modal {
      background: #151b28;
      border-radius: 18px;
      padding: 24px 24px 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.16);
      position: relative;
    }
    .auth-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: transparent;
      border: none;
      color: #bfc6d8;
      font-size: 20px;
      cursor: pointer;
    }
    .auth-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .auth-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      background: #111623;
      padding: 4px;
      border-radius: 999px;
    }
    .auth-tab {
      flex: 1;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: #b1b9c7;
      font-weight: 600;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .auth-tab-active {
      background: linear-gradient(90deg, #ffd363 0%, #ff8a3c 100%);
      color: #000;
    }
    .auth-body {
      margin-top: 4px;
    }
    .auth-form {
      display: none;
    }
    .auth-form-active {
      display: block;
    }
    .auth-field {
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .auth-field label {
      font-size: 0.85rem;
      color: #c7cfdd;
    }
    .auth-field input {
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: #111623;
      color: #fff;
      font-size: 0.9rem;
    }
    .auth-field input:focus {
      outline: none;
      border-color: #ffd363;
      box-shadow: 0 0 0 1px rgba(255,211,99,0.4);
    }
    .auth-submit {
      width: 100%;
      justify-content: center;
      margin-top: 6px;
    }
    .auth-switch {
      margin-top: 10px;
      font-size: 0.86rem;
      color: #b7bfd0;
      text-align: center;
    }
    .auth-switch a {
      color: #ffd363;
      text-decoration: none;
      font-weight: 700;
    }
    .auth-switch a:hover {
      text-decoration: underline;
    }
    .auth-hint {
      margin-top: 10px;
      font-size: 0.78rem;
      color: #7e8596;
      text-align: center;
    }

    /* Phim từ TMDB API - Horizontal Slider */
    .slider-container {
      position: relative;
      margin-top: 16px;
    }
    .movie-grid {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 8px;
      /* Ẩn thanh cuộn */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .movie-grid::-webkit-scrollbar {
      display: none;
    }
    .movie-card {
      flex: 0 0 160px;
      width: 160px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform .2s, box-shadow .2s;
    }
    .movie-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }
    .movie-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
    }
    .movie-card .movie-info {
      padding: 10px 12px;
    }
    .movie-card .movie-title {
      font-weight: 700;
      font-size: 0.9rem;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .movie-card .movie-rating {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .movie-card .movie-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(135deg, #2a3548 0%, #1a2235 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 2.5rem;
    }
    /* Nút mũi tên slider */
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 42px;
      height: 64px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      font-size: 1.7rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, opacity .2s;
      opacity: 0.85;
      backdrop-filter: blur(4px);
    }
    .slider-btn:hover {
      background: rgba(255, 211, 99, 0.85);
      color: #000;
      opacity: 1;
    }
    .slider-btn-left  { left: -18px; }
    .slider-btn-right { right: -18px; }
    .slider-btn[hidden] { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="nav-top">
        <div class="brand"><span>Liqi</span> Phim</div>
        <div class="nav-top-right">
          <a class="btn premium-top-btn" href="premium.html">★ Premium</a>
          <div class="member-wrap" id="member-wrap">
            <button class="btn btn-like" id="member-btn" style="padding: 8px 14px;">Thành viên</button>
            <div class="member-dropdown" id="member-dropdown" aria-hidden="true">
            <div class="member-row">
              <div class="member-icon">👤</div>
              <div>
                <div id="member-name">Xin chào</div>
                <small id="member-email"></small>
                <small id="member-role" style="display:block;margin-top:2px;color:rgba(0,0,0,0.55);font-weight:800;"></small>
              </div>
            </div>
            <a class="member-action" href="favorites.html">
              <span class="member-icon" style="width:30px;height:30px;border-radius:9px;">♥</span>
              Yêu thích
            </a>
            <a class="member-action" href="premium.html">
              <span class="member-icon" style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#e50914,#7c3aed);">★</span>
              Premium
            </a>
            <a class="member-action" href="history.html">
              <span class="member-icon" style="width:30px;height:30px;border-radius:9px;">🕘</span>
              Lịch sử xem
            </a>
            <button class="member-action" id="member-logout" type="button">
              <span class="member-icon" style="width:30px;height:30px;border-radius:9px;">⎋</span>
              Đăng xuất
            </button>
          </div>
          </div>
        </div>
      </div>

      <div class="nav-bottom">
        <ul class="menu">
          <li><a href="#">Xem chung</a></li>
          <li><a href="#">Lịch chiếu</a></li>
          <li><a href="#">Reviews</a></li>
        </ul>
        <div class="search-wrap">
          <input type="search" id="search-input" placeholder="Tìm kiếm phim, diễn viên..." />
          <button id="search-clear" class="search-clear-btn" title="Xóa tìm kiếm">✕</button>
        </div>
      </div>
    </nav>

    <section class="hero" id="hero-section" aria-label="Feature movie">
      <div class="hero-content">
        <div class="hero-sub" id="hero-sub">Đang tải...</div>
        <h1 class="hero-title" id="hero-title">Liqi Phim</h1>
        <div class="hero-meta" id="hero-meta">
          <span class="pill">TMDB</span>
        </div>
        <p class="hero-desc" id="hero-desc">Đang tải phim phổ biến...</p>
        <div class="hero-actions">
          <button class="btn btn-play" id="hero-play-btn">▶ Xem phim</button>
          <button class="btn btn-like" id="hero-fav-btn">❤ Thích</button>
        </div>
      </div>
      <div class="hero-thumbnails-wrap" id="hero-thumbnails-wrap"></div>
    </section>

    <div class="filter-bar" aria-label="Bộ lọc">
      <div class="filter-item">
        <label for="filter-type">Phim</label>
        <select id="filter-type">
          <option value="all" selected>Cả hai</option>
          <option value="movie">Phim lẻ</option>
          <option value="tv">Phim bộ</option>
        </select>
      </div>
      <div class="filter-item">
        <label for="filter-genre">Thể loại</label>
        <select id="filter-genre">
          <option value="all" selected>Tất cả</option>
          <option value="vien-tuong">Viễn Tưởng</option>
          <option value="kinh-di">Kinh Dị</option>
          <option value="sitcom">Sitcom</option>
          <option value="chieu-rap">Chiếu Rạp</option>
          <option value="co-trang">Cổ Trang</option>
        </select>
      </div>
      <div class="filter-item">
        <label for="filter-topic">Chủ đề</label>
        <select id="filter-topic">
          <option value="all" selected>Tất cả</option>
          <option value="vien-tuong">Viễn Tưởng</option>
          <option value="thai-lan">Thái Lan</option>
          <option value="sitcom">Sitcom</option>
          <option value="chieu-rap">Chiếu Rạp</option>
          <option value="kinh-di">Kinh Dị</option>
          <option value="co-trang">Cổ Trang</option>
        </select>
      </div>
    </div>

    <h2 class="section-title" id="movies-section-title">Hot</h2>
    <div class="slider-container">
      <button class="slider-btn slider-btn-left" id="slider-prev" aria-label="Xem trước" hidden>&#8249;</button>
      <div class="movie-grid" id="movie-grid"></div>
      <button class="slider-btn slider-btn-right" id="slider-next" aria-label="Xem tiếp">&#8250;</button>
    </div>

    <h2 class="section-title">Trending</h2>
    <div class="slider-container">
      <button class="slider-btn slider-btn-left" id="tr-slider-prev" aria-label="Xem trước" hidden>&#8249;</button>
      <div class="movie-grid" id="top-rated-grid"></div>
      <button class="slider-btn slider-btn-right" id="tr-slider-next" aria-label="Xem tiếp">&#8250;</button>
    </div>

    <h2 class="section-title">Phim mới</h2>
    <div class="slider-container">
      <button class="slider-btn slider-btn-left" id="np-slider-prev" aria-label="Xem trước" hidden>&#8249;</button>
      <div class="movie-grid" id="now-playing-grid"></div>
      <button class="slider-btn slider-btn-right" id="np-slider-next" aria-label="Xem tiếp">&#8250;</button>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap" aria-live="polite" aria-atomic="true"></div>

  <!-- Modal Thành viên -->
  <div class="auth-backdrop" id="auth-backdrop" style="display:none;">
    <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">
      <button class="auth-close" id="auth-close" aria-label="Đóng">×</button>
      <h2 id="auth-title" class="auth-title">Thành viên</h2>

      <div class="auth-tabs">
        <button class="auth-tab auth-tab-active" data-tab="login">Đăng nhập</button>
        <button class="auth-tab" data-tab="register">Đăng ký</button>
      </div>

      <div class="auth-body">
        <form id="login-form" class="auth-form auth-form-active">
          <div class="auth-field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Nhập email của bạn" required />
          </div>
          <div class="auth-field">
            <label for="login-password">Mật khẩu</label>
            <input type="password" id="login-password" placeholder="Nhập mật khẩu" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-play auth-submit">Đăng nhập</button>
          <p class="auth-switch">
            Nếu bạn chưa có tài khoản,
            <a href="#" id="go-register">đăng ký ngay</a>
          </p>
        </form>

        <form id="register-form" class="auth-form">
          <div class="auth-field">
            <label for="reg-name">Họ và tên</label>
            <input type="text" id="reg-name" placeholder="Nhập họ tên" required />
          </div>
          <div class="auth-field">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="Nhập email" required />
          </div>
          <div class="auth-field">
            <label for="reg-password">Mật khẩu</label>
            <input type="password" id="reg-password" placeholder="Tối thiểu 6 ký tự" required minlength="6" />
          </div>
          <div class="auth-field">
            <label for="reg-password-confirm">Nhập lại mật khẩu</label>
            <input type="password" id="reg-password-confirm" placeholder="Nhập lại mật khẩu" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-play auth-submit">Tạo tài khoản</button>
          <p class="auth-switch">
            Nếu bạn đã có tài khoản,
            <a href="#" id="go-login">đăng nhập ngay</a>
          </p>
        </form>
      </div>
      
    </div>
  </div>

  

  <script>
    (function () {
      const API_BASE = window.API_BASE || 'http://localhost:8080';
      function apiUrl(path) { return API_BASE + path; }
      const memberBtn = document.getElementById('member-btn');
      const backdrop = document.getElementById('auth-backdrop');
      const closeBtn = document.getElementById('auth-close');
      const memberWrap = document.getElementById('member-wrap');
      const memberDropdown = document.getElementById('member-dropdown');
      const memberName = document.getElementById('member-name');
      const memberEmail = document.getElementById('member-email');
      const memberLogout = document.getElementById('member-logout');
      const toastWrap = document.getElementById('toast-wrap');
      const memberRole = document.getElementById('member-role');
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const goRegister = document.getElementById('go-register');
      const goLogin = document.getElementById('go-login');
      let currentUser = null;
      let jwtToken = null;

      // Helper: Lấy JWT token từ localStorage
      function getStoredToken() {
        return localStorage.getItem('jwt_token');
      }

      // Helper: Lưu JWT token vào localStorage
      function setStoredToken(token) {
        if (token) {
          localStorage.setItem('jwt_token', token);
          jwtToken = token;
        } else {
          localStorage.removeItem('jwt_token');
          jwtToken = null;
        }
      }

      // Helper: Tạo headers với Authorization
      function getAuthHeaders() {
        const headers = { 'Content-Type': 'application/json' };
        if (jwtToken) {
          headers['Authorization'] = 'Bearer ' + jwtToken;
        }
        return headers;
      }

      function openModal() {
        backdrop.style.display = 'flex';
      }

      function closeModal() {
        backdrop.style.display = 'none';
      }

      function showToast(type, title, message) {
        if (!toastWrap) return;
        const el = document.createElement('div');
        el.className = 'toast ' + (type === 'success' ? 'toast-success' : 'toast-error');
        el.innerHTML =
          '<div>' +
            '<div class="toast-title">' + title + '</div>' +
            '<div class="toast-msg">' + message + '</div>' +
          '</div>' +
          '<button class="toast-close" aria-label="Đóng">×</button>';

        const close = function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        };

        el.querySelector('.toast-close').addEventListener('click', close);
        toastWrap.appendChild(el);
        setTimeout(close, 2800);
      }

      function setDropdownOpen(open) {
        if (!memberWrap || !memberDropdown) return;
        memberWrap.classList.toggle('is-open', !!open);
        memberDropdown.setAttribute('aria-hidden', open ? 'false' : 'true');
      }

      function updateMemberButton() {
        if (!memberBtn) return;
        if (currentUser && (currentUser.fullName || currentUser.email)) {
          const name = (currentUser.fullName || currentUser.email).split(' ')[0];
          memberBtn.textContent = 'Xin chào, ' + name;
          if (memberName) memberName.textContent = 'Xin chào, ' + (currentUser.fullName || name);
          if (memberEmail) memberEmail.textContent = currentUser.email || '';
          if (memberRole) {
            const role = currentUser.role ? String(currentUser.role) : 'ROLE_USER';
            const label = role === 'ROLE_ADMIN' ? 'Admin' : (role === 'ROLE_PREMIUM' ? 'Premium' : 'User');
            memberRole.textContent = 'Gói: ' + label;
          }
        } else {
          memberBtn.textContent = 'Thành viên';
          if (memberName) memberName.textContent = 'Xin chào';
          if (memberEmail) memberEmail.textContent = '';
          if (memberRole) memberRole.textContent = '';
          setDropdownOpen(false);
        }
      }

      memberBtn && memberBtn.addEventListener('click', function () {
        if (currentUser) {
          // Khi đã đăng nhập, click chỉ toggle dropdown
          setDropdownOpen(!memberWrap.classList.contains('is-open'));
        } else {
          openModal();
        }
      });
      closeBtn && closeBtn.addEventListener('click', closeModal);
      backdrop && backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) {
          closeModal();
        }
      });

      // Click ra ngoài sẽ đóng dropdown
      document.addEventListener('click', function (e) {
        if (!memberWrap || !memberWrap.classList.contains('is-open')) return;
        if (memberWrap.contains(e.target)) return;
        setDropdownOpen(false);
      });

      memberLogout && memberLogout.addEventListener('click', function () {
        fetch(apiUrl('/api/auth/logout'), { 
          method: 'POST',
          headers: getAuthHeaders()
        })
          .then(function () {
            currentUser = null;
            setStoredToken(null);
            updateMemberButton();
            showToast('success', 'Thành công', 'Đã đăng xuất.');
          })
          .catch(function () {
            currentUser = null;
            setStoredToken(null);
            updateMemberButton();
            showToast('error', 'Lỗi', 'Đăng xuất thất bại.');
          });
      });

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          const target = tab.getAttribute('data-tab');

          tabs.forEach(function (t) {
            t.classList.toggle('auth-tab-active', t === tab);
          });

          forms.forEach(function (form) {
            form.classList.toggle('auth-form-active', form.id.indexOf(target) === 0);
          });
        });
      });

      goRegister && goRegister.addEventListener('click', function (e) {
        e.preventDefault();
        tabs[1] && tabs[1].click();
      });

      goLogin && goLogin.addEventListener('click', function (e) {
        e.preventDefault();
        tabs[0] && tabs[0].click();
      });

      function setLoggedInUser(user, token) {
        currentUser = user;
        if (token) {
          setStoredToken(token);
        }
        updateMemberButton();
        closeModal();
      }

      loginForm && loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email || !password) {
          alert('Vui lòng nhập đầy đủ email và mật khẩu.');
          return;
        }

        fetch(apiUrl('/api/auth/login'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: email, password: password })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (data) {
                throw new Error(data.message || 'Đăng nhập thất bại');
              }).catch(function () {
                throw new Error('Đăng nhập thất bại');
              });
            }
            return res.json();
          })
          .then(function (data) {
            showToast('success', 'Đăng nhập thành công', 'Xin chào ' + (data.fullName || data.email) + '!');
            setLoggedInUser(data, data.token);
          })
          .catch(function (err) {
            showToast('error', 'Đăng nhập thất bại', err.message);
          });
      });

      registerForm && registerForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-password-confirm').value;

        if (!name || !email || !password || !confirm) {
          alert('Vui lòng điền đầy đủ thông tin.');
          return;
        }
        if (password.length < 6) {
          alert('Mật khẩu phải từ 6 ký tự trở lên.');
          return;
        }
        if (password !== confirm) {
          alert('Mật khẩu nhập lại không khớp.');
          return;
        }

        fetch(apiUrl('/api/auth/register'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            fullName: name,
            email: email,
            password: password
          })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (data) {
                throw new Error(data.message || 'Đăng ký thất bại');
              }).catch(function () {
                throw new Error('Đăng ký thất bại');
              });
            }
            return res.json();
          })
          .then(function (data) {
            showToast('success', 'Đăng ký thành công', 'Chào mừng bạn đến với Liqi Phim!');
            setLoggedInUser(data, data.token);
          })
          .catch(function (err) {
            showToast('error', 'Đăng ký thất bại', err.message);
          });
      });

      // Khi tải trang, kiểm tra token trong localStorage và xác thực
      const storedToken = getStoredToken();
      if (storedToken) {
        jwtToken = storedToken;
        fetch(apiUrl('/api/auth/me'), {
          headers: getAuthHeaders()
        })
          .then(function (res) {
            if (!res.ok) {
              // Token không hợp lệ, xóa nó
              setStoredToken(null);
              throw new Error();
            }
            return res.json();
          })
          .then(function (data) {
            currentUser = data;
            updateMemberButton();
          })
          .catch(function () {
            currentUser = null;
            setStoredToken(null);
            updateMemberButton();
          });
      } else {
        // Không có token, kiểm tra session cũ (fallback)
        fetch(apiUrl('/api/auth/me'))
          .then(function (res) {
            if (!res.ok) {
              throw new Error();
            }
            return res.json();
          })
          .then(function (data) {
            currentUser = data;
            updateMemberButton();
          })
          .catch(function () {
            currentUser = null;
            updateMemberButton();
          });
      }

      // TMDB API - Phim phổ biến & tìm kiếm
      const { grid: movieGrid, updateBtns: updateSliderBtns } = makeSlider('movie-grid', 'slider-prev', 'slider-next');
      const { grid: topRatedGrid, updateBtns: updateTRBtns }  = makeSlider('top-rated-grid', 'tr-slider-prev', 'tr-slider-next');
      const { grid: nowPlayingGrid, updateBtns: updateNPBtns } = makeSlider('now-playing-grid', 'np-slider-prev', 'np-slider-next');
      const heroSection = document.getElementById('hero-section');
      const heroSub = document.getElementById('hero-sub');
      const heroTitle = document.getElementById('hero-title');
      const heroMeta = document.getElementById('hero-meta');
      const heroDesc = document.getElementById('hero-desc');
      const moviesSectionTitle = document.getElementById('movies-section-title');
      const searchInput = document.getElementById('search-input');
      const filterTypeSelect = document.getElementById('filter-type');
      const filterGenreSelect = document.getElementById('filter-genre');
      const filterTopicSelect = document.getElementById('filter-topic');
      const searchClearBtn = document.getElementById('search-clear');

      // ---- Helper: tạo slider độc lập cho một grid bất kỳ ----
      function makeSlider(gridId, prevId, nextId) {
        const grid = document.getElementById(gridId);
        const prev = document.getElementById(prevId);
        const next = document.getElementById(nextId);
        function updateBtns() {
          if (!grid) return;
          const atStart = grid.scrollLeft <= 4;
          const atEnd   = grid.scrollLeft + grid.clientWidth >= grid.scrollWidth - 4;
          if (prev) prev.hidden = atStart;
          if (next) next.hidden = atEnd;
        }
        prev && prev.addEventListener('click', function () { grid && grid.scrollBy({ left: -620, behavior: 'smooth' }); });
        next && next.addEventListener('click', function () { grid && grid.scrollBy({ left:  620, behavior: 'smooth' }); });
        grid && grid.addEventListener('scroll', updateBtns);
        return { grid, updateBtns };
      }

      function renderMovies(movies) {
        buildCards(movies, movieGrid, updateSliderBtns);
      }

      function buildCards(movies, grid, updateBtns) {
        if (!grid) return;
        grid.innerHTML = '';
        grid.scrollLeft = 0;
        if (!movies || movies.length === 0) {
          grid.innerHTML = '<p style="padding:12px;color:var(--muted);">Không tìm thấy phim.</p>';
          updateBtns();
          return;
        }
        movies.forEach(function (m) {
          const title     = m.title || m.name || 'Không có tên';
          const rating    = m.vote_average != null ? m.vote_average.toFixed(1) : '-';
          const posterUrl = m.poster_url || null;
          const year      = (m.release_date || m.first_air_date || '').substring(0, 4);
          const card      = document.createElement('article');
          card.className  = 'movie-card';

          const imgFrag = posterUrl ? '<img src="' + posterUrl + '" alt="' + title + '" loading="lazy" />'
            : '<div class="movie-placeholder">🎬</div>';

          const isFav = currentUser && currentUser.favoriteMovieIds && currentUser.favoriteMovieIds.indexOf(String(m.id)) >= 0;
          const favLabel = isFav ? '♥ Đã thích' : '♡ Thích';

          card.innerHTML  =
            imgFrag +
            '<div class="movie-info">' +
              '<div class="movie-title">' + title + '</div>' +
              '<div class="movie-rating">★ ' + rating + (year ? ' · ' + year : '') + '</div>' +
              '<button class="btn-fav' + (isFav ? ' active' : '') + '" type="button">' + favLabel + '</button>' +
            '</div>';

          const favBtn = card.querySelector('.btn-fav');
          if (favBtn) {
            favBtn.addEventListener('click', function (evt) {
              evt.stopPropagation();
              if (!currentUser || !currentUser.id) {
                showToast('error', 'Cần đăng nhập', 'Vui lòng đăng nhập để lưu phim yêu thích.');
                openModal();
                return;
              }

              if (favBtn.classList.contains('active')) {
                fetch(apiUrl('/api/auth/favorites/' + encodeURIComponent(m.id)), { 
                  method: 'DELETE',
                  headers: getAuthHeaders()
                })
                  .then(function (res) {
                    if (!res.ok) throw new Error('Xoá yêu thích thất bại');
                    return res.json();
                  }).then(function (data) {
                    favBtn.classList.remove('active');
                    favBtn.textContent = '♡ Thích';
                    currentUser.favoriteMovieIds = data.favorites || currentUser.favoriteMovieIds;
                    showToast('success', 'Đã xoá', 'Đã xóa phim khỏi danh sách yêu thích.');
                  }).catch(function () {
                    showToast('error', 'Lỗi', 'Không thể xoá yêu thích.');
                  });
              } else {
                fetch(apiUrl('/api/auth/favorites'), {
                  method: 'POST',
                  headers: getAuthHeaders(),
                  body: JSON.stringify({ movieId: String(m.id) })
                }).then(function (res) {
                  if (!res.ok) throw new Error('Thêm yêu thích thất bại');
                  return res.json();
                }).then(function (data) {
                  favBtn.classList.add('active');
                  favBtn.textContent = '♥ Đã thích';
                  currentUser.favoriteMovieIds = data.favorites || currentUser.favoriteMovieIds;
                  showToast('success', 'Đã thêm', 'Đã thêm phim vào danh sách yêu thích.');
                }).catch(function () {
                  showToast('error', 'Lỗi', 'Không thể thêm yêu thích.');
                });
              }
            });
          }

          card.style.cursor = 'pointer';
          card.addEventListener('click', function() {
            window.location.href = 'movie.html?id=' + m.id;
          });
          grid.appendChild(card);
        });
        setTimeout(updateBtns, 50);
      }

      // Hero Carousel Logic
      let heroMoviesList = [];
      let currentHeroIdx = 0;
      let heroAutoPlayInterval = null;

      function isPremiumUser() {
        const role = currentUser && currentUser.role ? String(currentUser.role) : '';
        return role === 'ROLE_PREMIUM' || role === 'ROLE_ADMIN';
      }

      function goPremium(nextUrl) {
        const next = nextUrl ? ('?next=' + encodeURIComponent(nextUrl)) : '';
        window.location.href = 'premium.html' + next;
      }

      function updateHero(movie, index) {
        if (!movie || !heroSection) return;
        const title = movie.title || movie.name || 'Liqi Phim';
        const desc = movie.overview || '';
        const rating = movie.vote_average != null ? movie.vote_average.toFixed(1) : '-';
        const year = (movie.release_date || movie.first_air_date || '').substring(0, 4);
        const backdrop = movie.backdrop_url;
        if (heroSub) heroSub.textContent = year ? year : 'Phim mới';
        if (heroTitle) heroTitle.textContent = title;
        if (heroMeta) {
          heroMeta.innerHTML = '<span class="pill">TMDB ' + rating + '</span>' +
            (year ? '<span class="pill">' + year + '</span>' : '');
        }
        if (heroDesc) {
           heroDesc.textContent = desc.length > 200 ? desc.substring(0, 200) + '...' : (desc || 'Không có mô tả.');
        }
        if (backdrop) {
          heroSection.style.backgroundImage = 'linear-gradient(250deg, rgba(11, 16, 23, .55) 33%, rgba(11, 16, 23, .18) 50%, rgba(11, 16, 23, .72) 100%), url(\'' + backdrop + '\')';
        }
        
        const playBtn = document.getElementById('hero-play-btn');
        if (playBtn) {
          playBtn.onclick = function() {
            if (!currentUser || !currentUser.id) {
              showToast('error', 'Cần đăng nhập', 'Vui lòng đăng nhập để xem phim.');
              openModal();
              return;
            }
            if (!isPremiumUser()) {
              goPremium('movie.html?id=' + movie.id);
              return;
            }
            window.location.href = 'movie.html?id=' + movie.id;
          };
        }

        const heroFavBtn = document.getElementById('hero-fav-btn');
        if (heroFavBtn) {
          heroFavBtn.onclick = function () {
            if (!currentUser || !currentUser.id) {
              showToast('error', 'Cần đăng nhập', 'Vui lòng đăng nhập để lưu phim yêu thích.');
              openModal();
              return;
            }

            const isHeroFav = currentUser && currentUser.favoriteMovieIds && currentUser.favoriteMovieIds.indexOf(String(movie.id)) >= 0;
            heroFavBtn.textContent = isHeroFav ? '♥ Đã thích' : '❤ Thích';

            if (isHeroFav) {
              fetch(apiUrl('/api/auth/favorites/' + encodeURIComponent(movie.id)), { method: 'DELETE', headers: getAuthHeaders() })
                .then(function (res) { if (!res.ok) throw new Error('Xoá thất bại'); return res.json(); })
                .then(function (data) {
                  currentUser.favoriteMovieIds = data.favorites || currentUser.favoriteMovieIds;
                  heroFavBtn.textContent = '❤ Thích';
                  showToast('success', 'Đã xoá', 'Đã xoá phim yêu thích.');
                }).catch(function () { showToast('error', 'Lỗi', 'Không thể xoá yêu thích.'); });
            } else {
              fetch(apiUrl('/api/auth/favorites'), {
                method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ movieId: String(movie.id) })
              }).then(function (res) { if (!res.ok) throw new Error('Thêm thất bại'); return res.json(); })
                .then(function (data) {
                  currentUser.favoriteMovieIds = data.favorites || currentUser.favoriteMovieIds;
                  heroFavBtn.textContent = '♥ Đã thích';
                  showToast('success', 'Đã thêm', 'Đã thêm phim yêu thích.');
                }).catch(function () { showToast('error', 'Lỗi', 'Không thể thêm yêu thích.'); });
            }
          };

          // Set initial label after binding
          const favorited = currentUser && currentUser.favoriteMovieIds && currentUser.favoriteMovieIds.indexOf(String(movie.id)) >= 0;
          heroFavBtn.textContent = favorited ? '♥ Đã thích' : '❤ Thích';
        }

        const thumbs = document.querySelectorAll('.hero-thumb');
        thumbs.forEach(function(th, i) {
          if (i === index) {
            th.classList.add('active');
            th.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          } else {
            th.classList.remove('active');
          }
        });
      }

      function renderHeroThumbnails() {
        const wrap = document.getElementById('hero-thumbnails-wrap');
        if (!wrap) return;
        wrap.innerHTML = '';
        const limit = Math.min(heroMoviesList.length, 10);
        for(let i = 0; i < limit; i++) {
          const m = heroMoviesList[i];
          const img = document.createElement('img');
          img.src = m.backdrop_url ? m.backdrop_url : (m.poster_url || '');
          img.className = 'hero-thumb' + (i === 0 ? ' active' : '');
          img.alt = m.title || m.name || '';
          img.onclick = function() {
            currentHeroIdx = i;
            updateHero(m, i);
            resetHeroInterval();
          };
          wrap.appendChild(img);
        }
      }

      function nextHero() {
        if (heroMoviesList.length === 0) return;
        const limit = Math.min(heroMoviesList.length, 10);
        currentHeroIdx = (currentHeroIdx + 1) % limit;
        updateHero(heroMoviesList[currentHeroIdx], currentHeroIdx);
      }

      function resetHeroInterval() {
        if (heroAutoPlayInterval) clearInterval(heroAutoPlayInterval);
        heroAutoPlayInterval = setInterval(nextHero, 5000);
      }

      function loadMovies(query) {
        const qTrim = query && query.trim() ? query.trim() : '';
        const typeVal = filterTypeSelect ? filterTypeSelect.value : 'all';
        const genreVal = filterGenreSelect ? filterGenreSelect.value : 'all';
        const topicVal = filterTopicSelect ? filterTopicSelect.value : 'all';

        let url = '/api/movies/browse?page=1&type=' + encodeURIComponent(typeVal);
        if (qTrim) {
          url += '&q=' + encodeURIComponent(qTrim);
        } else {
          if (genreVal && genreVal !== 'all') url += '&genre=' + encodeURIComponent(genreVal);
          if (topicVal && topicVal !== 'all') url += '&topic=' + encodeURIComponent(topicVal);
        }

        // Ẩn/hiện hero section dựa trên việc có tìm kiếm hay không
        if (heroSection) {
          if (qTrim) {
            heroSection.style.display = 'none';
          } else {
            heroSection.style.display = 'block';
          }
        }

        if (moviesSectionTitle) {
          if (qTrim) moviesSectionTitle.textContent = 'Kết quả tìm kiếm cho "' + qTrim + '"';
          else if ((genreVal && genreVal !== 'all') || (topicVal && topicVal !== 'all')) moviesSectionTitle.textContent = 'Kết quả lọc';
          else moviesSectionTitle.textContent = 'Hot';
        }
        movieGrid && (movieGrid.innerHTML = '<p style="grid-column:1/-1;color:var(--muted);">Đang tải...</p>');
        fetch(apiUrl(url))
          .then(function (res) { return res.json(); })
          .then(function (movies) {
            renderMovies(Array.isArray(movies) ? movies : []);
            if (movies && movies.length > 0 && !query) {
              heroMoviesList = movies;
              currentHeroIdx = 0;
              renderHeroThumbnails();
              updateHero(movies[0], 0);
              resetHeroInterval();
            } else if (query) {
              if (heroAutoPlayInterval) clearInterval(heroAutoPlayInterval);
              if (movies.length > 0) updateHero(movies[0], 0);
              const wrap = document.getElementById('hero-thumbnails-wrap');
              if (wrap) wrap.innerHTML = '';
            }
          })
          .catch(function () {
            // Fallback: dùng endpoint cũ để luôn hiển thị danh sách
            fetch(apiUrl('/api/movies/popular?page=1'))
              .then(function (r) { return r.json(); })
              .then(function (fallbackMovies) {
                renderMovies(Array.isArray(fallbackMovies) ? fallbackMovies : []);
                if (Array.isArray(fallbackMovies) && fallbackMovies.length > 0 && !query) {
                  heroMoviesList = fallbackMovies;
                  currentHeroIdx = 0;
                  renderHeroThumbnails();
                  updateHero(fallbackMovies[0], 0);
                  resetHeroInterval();
                }
              })
              .catch(function () {
                if (movieGrid) movieGrid.innerHTML = '<p style="grid-column:1/-1;color:var(--accent2);">Không thể tải phim. Kiểm tra kết nối hoặc API key.</p>';
              });
          });
      }

      loadMovies();

      function currentType() {
        return filterTypeSelect ? filterTypeSelect.value : 'all';
      }

      function reloadTrending() {
        topRatedGrid && (topRatedGrid.innerHTML = '<p style="padding:12px;color:var(--muted);">Đang tải...</p>');
        fetch(apiUrl('/api/movies/trending?page=1&type=' + encodeURIComponent(currentType())))
          .then(function (res) { return res.json(); })
          .then(function (movies) { buildCards(Array.isArray(movies) ? movies : [], topRatedGrid, updateTRBtns); })
          .catch(function () {
            // Fallback: top-rated (endpoint cũ)
            fetch(apiUrl('/api/movies/top-rated?page=1'))
              .then(function (r) { return r.json(); })
              .then(function (fallbackMovies) {
                buildCards(Array.isArray(fallbackMovies) ? fallbackMovies : [], topRatedGrid, updateTRBtns);
              })
              .catch(function () {
                if (topRatedGrid) topRatedGrid.innerHTML = '<p style="padding:12px;color:var(--accent2);">Không thể tải phim.</p>';
              });
          });
      }

      function reloadNowPlaying() {
        nowPlayingGrid && (nowPlayingGrid.innerHTML = '<p style="padding:12px;color:var(--muted);">Đang tải...</p>');
        fetch(apiUrl('/api/movies/now-playing?page=1&type=' + encodeURIComponent(currentType())))
          .then(function (res) { return res.json(); })
          .then(function (movies) { buildCards(Array.isArray(movies) ? movies : [], nowPlayingGrid, updateNPBtns); })
          .catch(function () {
            // Fallback: popular (endpoint cũ)
            fetch(apiUrl('/api/movies/popular?page=1'))
              .then(function (r) { return r.json(); })
              .then(function (fallbackMovies) {
                buildCards(Array.isArray(fallbackMovies) ? fallbackMovies : [], nowPlayingGrid, updateNPBtns);
              })
              .catch(function () {
                if (nowPlayingGrid) nowPlayingGrid.innerHTML = '<p style="padding:12px;color:var(--accent2);">Không thể tải phim.</p>';
              });
          });
      }

      reloadTrending();
      reloadNowPlaying();

      filterTypeSelect && filterTypeSelect.addEventListener('change', function () {
        loadMovies('');
        reloadTrending();
        reloadNowPlaying();
      });
      filterGenreSelect && filterGenreSelect.addEventListener('change', function () {
        loadMovies('');
        reloadTrending();
        reloadNowPlaying();
      });
      filterTopicSelect && filterTopicSelect.addEventListener('change', function () {
        loadMovies('');
        reloadTrending();
        reloadNowPlaying();
      });

      // Click vào các card "chủ đề" để set filter nhanh
      document.querySelectorAll('.cards .card[data-topic]').forEach(function (card) {
        card.addEventListener('click', function () {
          const topic = card.getAttribute('data-topic') || 'all';
          const genre = card.getAttribute('data-genre') || 'all';
          if (filterTopicSelect) filterTopicSelect.value = topic;
          if (filterGenreSelect) filterGenreSelect.value = genre;
          loadMovies('');
        });
      });

      var searchTimeout;
      searchInput && searchInput.addEventListener('input', function () {
        clearTimeout(searchTimeout);
        var q = searchInput.value.trim();
        // Hiển thị/ẩn nút clear
        if (searchClearBtn) {
          searchClearBtn.style.display = q ? 'block' : 'none';
        }
        searchTimeout = setTimeout(function () {
          loadMovies(q);
        }, 400);
      });
      searchInput && searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          clearTimeout(searchTimeout);
          loadMovies(searchInput.value.trim());
        }
      });

      // Xử lý nút clear search
      searchClearBtn && searchClearBtn.addEventListener('click', function () {
        searchInput.value = '';
        searchClearBtn.style.display = 'none';
        loadMovies('');
      });
    })();
  </script>
</body>
</html>
