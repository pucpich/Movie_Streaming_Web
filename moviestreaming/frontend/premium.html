<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nâng cấp Premium - Liqi Phim</title>
  <style>
    :root{
      /* match trang chủ */
      --bg: #0b1017;
      --text: #f5f6fa;
      --muted: #b1b9c7;
      --accent: #ffd363;
      --accent2: #ff8a3c;

      /* card */
      --cardBg: rgba(20, 30, 45, 0.80);
      --cardBg2: rgba(15, 20, 30, 0.64);
      --cardText: #f5f6fa;
      --cardMuted: rgba(177, 185, 199, 0.88);
      --border: rgba(255,255,255,0.13);
      --shadow: 0 10px 22px rgba(0,0,0,.24);
      --shadow2: 0 18px 44px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",Roboto,Arial,sans-serif;background: radial-gradient(circle at top left, #1d2b42 0%, #0b1017 60%);color:var(--text);min-height:100vh}
    .wrap{max-width:1120px;margin:0 auto;padding:34px 18px 54px}
    h1{font-size:34px;line-height:1.2;text-align:center;margin-bottom:18px}
    .subtitle{color:var(--muted);text-align:center;margin-bottom:28px;font-size:14px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
    .card{
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      background: var(--cardBg);
      box-shadow: var(--shadow);
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      position:relative;
      min-height: 560px; /* card dài hơn về phía dưới */
      display:flex;
      flex-direction:column;
      backdrop-filter: blur(10px);
    }
    .card:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
    .card.selected{border-color:rgba(255,211,99,.70);box-shadow:0 0 0 3px rgba(255,211,99,.14), var(--shadow2)}
    .card .top{
      padding:12px 14px;
      color:#fff;
      font-weight:800;
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:54px;
    }
    /* Badge "Phổ biến nhất" - tách class riêng */
    .popular-badge{
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:22px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      color:#000;
      display:none;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:800;
    }
    .card.featured .popular-badge{display:flex}
    .card .body{padding:14px;flex:1;background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);}
    .row{display:flex;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.10);font-size:13px}
    .row:last-child{border-bottom:0}
    .row .k{color:var(--cardMuted)}
    .row .v{font-weight:800;color:var(--cardText)}
    .actions{
      display:flex;
      justify-content:center;
      margin-top:22px;
    }
    .btn{
      border:0;
      border-radius:999px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      color:#000;
      font-weight:900;
      font-size:16px;
      padding:14px 24px;
      min-width:320px;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(255, 138, 60, 0.22);
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .note{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
      text-align:center;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(15, 20, 30, 0.45);
      backdrop-filter: blur(10px);
    }
    .back{
      color: var(--text);
      text-decoration:none;
      font-weight:900;
    }
    .status{color:var(--muted);font-size:13px}

    .error-banner{
      margin: 14px auto 0;
      max-width: 820px;
      background: rgba(255, 69, 97, 0.12);
      border: 1px solid rgba(255, 69, 97, 0.35);
      color: #ffd1d9;
      padding: 10px 12px;
      border-radius: 12px;
      display:none;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.45;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width: 520px){
      .grid{grid-template-columns:1fr}
      .btn{min-width:0;width:100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="index.html">← Quay lại</a>
      <div class="status" id="status">Chọn gói để nâng cấp Premium</div>
    </div>

    <h1>Chọn gói dịch vụ phù hợp với bạn</h1>
    <div class="subtitle">Chỉ tài khoản <b>Premium</b> và <b>Admin</b> mới có thể xem phim.</div>

    <div class="grid" id="plan-grid" aria-label="Chọn gói">
      <!-- filled by JS -->
    </div>

    <div class="actions">
      <button class="btn" id="next-btn" disabled>Tiếp theo</button>
    </div>

    <div class="error-banner" id="premium-error"></div>

    <div class="note">
      Đây là trang nâng cấp demo. Khi bấm “Tiếp theo”, hệ thống sẽ nâng quyền tài khoản lên <b>ROLE_PREMIUM</b>.
    </div>
  </div>

  <script>
    (function(){
      const API_BASE = window.API_BASE || 'http://localhost:8080';
      function apiUrl(path){ return API_BASE + path; }
      function getStoredToken(){ return localStorage.getItem('jwt_token'); }
      function setStoredToken(token){
        if (token) localStorage.setItem('jwt_token', token);
        else localStorage.removeItem('jwt_token');
      }
      function getAuthHeaders(){
        const t = getStoredToken();
        const h = { 'Content-Type': 'application/json' };
        if (t) h['Authorization'] = 'Bearer ' + t;
        return h;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const next = urlParams.get('next') || 'index.html';

      const plans = [
        { key:'mobile', title:'Di động', sub:'480p', price:'74.000 ₫', quality:'Khá', res:'480p', devices:'Điện thoại di động, máy tính bảng', screens:'1', downloads:'1', grad:'linear-gradient(135deg,#1e3a8a,#3b82f6)' },
        { key:'basic', title:'Cơ bản', sub:'720p', price:'114.000 ₫', quality:'Tốt', res:'720p (HD)', devices:'TV, máy tính, điện thoại di động, máy tính bảng', screens:'1', downloads:'1', grad:'linear-gradient(135deg,#1e3a8a,#7c3aed)' },
        { key:'standard', title:'Tiêu chuẩn', sub:'1080p', price:'231.000 ₫', quality:'Tuyệt vời', res:'1080p (Full HD)', devices:'TV, máy tính, điện thoại di động, máy tính bảng', screens:'2', downloads:'2', grad:'linear-gradient(135deg,#1e3a8a,#a855f7)' },
        { key:'premium', title:'Cao cấp', sub:'4K + HDR', price:'273.000 ₫', quality:'Tốt nhất có thể', res:'4K (Ultra HD) + HDR', devices:'TV, máy tính, điện thoại di động, máy tính bảng', screens:'4', downloads:'6', grad:'linear-gradient(135deg,#7c3aed,#e11d48)' , featured:true},
      ];

      const grid = document.getElementById('plan-grid');
      const nextBtn = document.getElementById('next-btn');
      const status = document.getElementById('status');
      const errEl = document.getElementById('premium-error');
      let selected = null;

      function render(){
        grid.innerHTML = '';
        plans.forEach(p => {
          const card = document.createElement('div');
          card.className = 'card' + (p.featured ? ' featured' : '') + (selected === p.key ? ' selected' : '');
          card.setAttribute('role','button');
          card.tabIndex = 0;
          card.innerHTML = `
            <div class="popular-badge">Phổ biến nhất</div>
            <div class="top" style="background:${p.grad}">
              <div>${p.title}<div style="font-weight:800;font-size:12px;opacity:.95">${p.sub}</div></div>
              <div style="width:18px;height:18px;border-radius:999px;border:2px solid rgba(255,255,255,.9);background:${selected===p.key?'rgba(255,255,255,.9)':'transparent'}"></div>
            </div>
            <div class="body">
              <div class="row"><div class="k">Giá hàng tháng</div><div class="v">${p.price}</div></div>
              <div class="row"><div class="k">Chất lượng hình ảnh và âm</div><div class="v">${p.quality}</div></div>
              <div class="row"><div class="k">Độ phân giải</div><div class="v">${p.res}</div></div>
              <div class="row"><div class="k">Thiết bị được hỗ trợ</div><div class="v">${p.devices}</div></div>
              <div class="row"><div class="k">Số thiết bị mở mã gia đình</div><div class="v">${p.screens}</div></div>
              <div class="row"><div class="k">Số thiết bị được tải xuống</div><div class="v">${p.downloads}</div></div>
            </div>
          `;
          function selectPlan(){
            selected = p.key;
            nextBtn.disabled = false;
            status.textContent = 'Đã chọn gói: ' + p.title + ' · ' + p.price;
            render();
          }
          card.addEventListener('click', selectPlan);
          card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') selectPlan(); });
          grid.appendChild(card);
        });
      }

      render();

      nextBtn.addEventListener('click', function(){
        const token = getStoredToken();
        if (!token) {
          alert('Bạn cần đăng nhập trước khi nâng cấp Premium.');
          window.location.href = 'index.html';
          return;
        }
        nextBtn.disabled = true;
        nextBtn.textContent = 'Đang nâng cấp...';
        if (errEl) { errEl.style.display = 'none'; errEl.textContent=''; }

        fetch(apiUrl('/api/auth/upgrade-premium'), {
          method: 'POST',
          headers: getAuthHeaders()
        }).then(res => {
          return res.text().then(t => {
            if (!res.ok) {
              const msg = t || ('HTTP ' + res.status);
              throw new Error('Nâng cấp thất bại (' + res.status + '): ' + msg);
            }
            try { return t ? JSON.parse(t) : {}; } catch { return {}; }
          });
        }).then(data => {
          if (data && data.token) setStoredToken(data.token);
          window.location.href = next;
        }).catch((e) => {
          const msg = (e && e.message) ? e.message : 'Không thể nâng cấp Premium. Vui lòng thử lại.';
          if (errEl) { errEl.style.display = 'block'; errEl.textContent = msg; }
          else alert(msg);
          nextBtn.disabled = false;
          nextBtn.textContent = 'Tiếp theo';
        });
      });
    })();
  </script>
</body>
</html>
